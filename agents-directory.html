            margin-bottom: 24px;
        }

        .controls {

            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            max-width: 500px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
        }

        input[type="text"]::placeholder {
            color: #555;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
        }

        .tag-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tag-btn {
            padding: 8px 16px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 20px;
            color: #999;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tag-btn:hover {
            border-color: #00d9ff;
            color: #00d9ff;
        }

        .tag-btn.active {
            background: #00d9ff;
            color: #000;
            border-color: #00d9ff;
        }

        .results-info {
            max-width: 1400px;
            margin: 0 auto 24px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }

        .grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .agent-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .agent-card:hover {
            border-color: #00d9ff;
            box-shadow: 0 8px 24px rgba(0, 217, 255, 0.15);
            transform: translateY(-4px);
        }

        .agent-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .agent-icon {
            font-size: 32px;
            min-width: 40px;
        }

        .agent-title {
            flex: 1;
        }

        .agent-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .agent-category {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .agent-desc {
            font-size: 13px;
            color: #b0b0b0;
            line-height: 1.5;
            flex: 1;
        }

        .agent-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            display: inline-block;
            background: #252525;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            color: #888;
            border: 1px solid #333;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 32px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: #666;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #fff;
        }

        .modal-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .modal-category {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

            font-size: 13px;
            color: #00d9ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 600;

            line-height: 1.6;

            font-size: 12px;
            border: 1px solid #333;
            color: #888;

        function init() {
            document.getElementById('totalCount').textContent = agents.length;
            document.getElementById('resultCount').textContent = agents.length;
            renderAgents();
            renderTagFilters();
        }

        function renderAgents() {
            const grid = document.getElementById('agentGrid');
            grid.innerHTML = '';

            if (filteredAgents.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No agents match your search</p></div>';
                return;
            }

            filteredAgents.forEach(agent => {
                const card = document.createElement('div');
                card.className = 'agent-card';
                card.onclick = () => showModal(agent);
                card.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-icon">${agent.icon}</div>
                        <div class="agent-title">
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-category">${agent.category}</div>
                        </div>
                    </div>
                    <div class="agent-desc">${agent.desc}</div>
                    <div class="agent-tags">
                        ${agent.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderTagFilters() {
            const allTags = new Set();
            agents.forEach(agent => agent.tags.forEach(tag => allTags.add(tag)));
            
            const filterDiv = document.getElementById('tagFilters');
            [...allTags].sort().forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'tag-btn';
                btn.textContent = tag;
                btn.onclick = () => toggleTag(tag, btn);
                filterDiv.appendChild(btn);
            });
        }

        function toggleTag(tag, btn) {
            if (selectedTags.has(tag)) {
                selectedTags.delete(tag);
                btn.classList.remove('active');
            } else {
                selectedTags.add(tag);
                btn.classList.add('active');
            }
            filterAgents();
        }

        function filterAgents() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            filteredAgents = agents.filter(agent => {
                const matchesSearch = agent.name.toLowerCase().includes(search) || 
                                    agent.desc.toLowerCase().includes(search) ||
                                    agent.tags.some(tag => tag.toLowerCase().includes(search));
                
                const matchesTags = selectedTags.size === 0 || 
                                   agent.tags.some(tag => selectedTags.has(tag));
                
                return matchesSearch && matchesTags;
            });

            document.getElementById('resultCount').textContent = filteredAgents.length;
            renderAgents();
        }

        function showModal(agent) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <div class="modal-title">${agent.icon} ${agent.name}</div>
                <div class="modal-category">${agent.category}</div>
                
                <div class="modal-section">
                    <div class="modal-section-title">Description</div>
                    <div class="modal-section-content">${agent.desc}</div>
                </div>
                
                <div class="modal-section">
                    <div class="modal-section-title">Best For</div>
                    <div class="modal-section-content">${agent.bestFor}</div>
                </div>
                
                <div class="modal-section">
                    <div class="modal-section-title">Tags</div>
                    <div class="modal-tags">
                        ${agent.tags.map(tag => `<span class="modal-tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('modal').onclick = (e) => {
            if (e.target.id === 'modal') closeModal();
        };

        init();
    </script>
</body>
</html>
